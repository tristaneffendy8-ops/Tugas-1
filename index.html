<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformasi Geometri Sederhana</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h2 { 
    margin: 0 0 5px 0; 
    font-size: 1.5rem; /* Menyesuaikan ukuran teks di HP */
  }
  p {
    margin: 0 0 15px 0;
    color: #555;
    font-size: 0.9rem;
  }
  
  /* Pembungkus kanvas agar tetap responsif */
  .canvas-container {
    width: 100%;
    max-width: 400px; /* Batas maksimal di PC */
    aspect-ratio: 1 / 1; /* Menjaga kanvas tetap kotak sempurna (1:1) */
    margin-bottom: 15px;
  }
  
  canvas {
    width: 100%;
    height: 100%;
    border: 2px solid #333;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  /* Wadah tombol agar rapi di HP */
  .btn-group {
    display: flex;
    flex-wrap: wrap; /* Tombol otomatis turun ke bawah jika layar HP terlalu sempit */
    justify-content: center;
    gap: 8px;
    max-width: 400px;
    width: 100%;
  }

  button {
    flex: 1 1 calc(50% - 8px); /* Di HP, tombol otomatis membagi rata (2 tombol per baris) */
    max-width: 180px;
    padding: 12px 10px; /* Padding lebih tebal agar mudah ditekan jari di HP */
    border: none;
    background: #4b7bec;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.9rem;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent; /* Menghapus warna biru saat tombol di-tap di HP */
  }
  button:hover { background: #3867d6; }
  button:active { background: #2b52b3; } /* Efek saat ditekan jari */
  
  button.btn-reset {
    background: #a5b1c2;
  }
  button.btn-reset:hover { background: #778ca3; }
  button.btn-reset:active { background: #4b6584; }
</style>
</head>

<body>
  <h2>🧮 Transformasi Geometri (2D)</h2>
  <p>Klik tombol untuk melihat perubahan bentuk persegi.</p>
  
  <div class="canvas-container">
    <!-- Atribut width dan height internal canvas tetap 400 untuk resolusi gambar, 
         tetapi ukuran tampilannya dikendalikan oleh CSS responsif -->
    <canvas id="kanvas" width="400" height="400"></canvas>
  </div>

  <div class="btn-group">
    <button onclick="translasi()">Translasi (Geser)</button>
    <button onclick="rotasi()">Rotasi (Putar)</button>
    <button onclick="skala()">Skala (Perbesar)</button>
    <button onclick="reset()" class="btn-reset">Reset</button>
  </div>

  <script>
    const canvas = document.getElementById("kanvas");
    const ctx = canvas.getContext("2d");

    // Posisi awal
    let x = 200, y = 200;
    let ukuran = 50;
    let sudut = 0;

    // Fungsi menggambar persegi
    function gambar() {
      ctx.clearRect(0, 0, canvas.width, canvas.height); // hapus gambar lama
      ctx.save();
      ctx.translate(x, y);   // pindah titik tengah
      ctx.rotate(sudut);     // putar
      ctx.scale(ukuran / 50, ukuran / 50); // ubah ukuran
      ctx.fillStyle = "#4b7bec";
      ctx.fillRect(-25, -25, 50, 50);  // gambar persegi (pusat di tengah)
      ctx.restore();
    }

    // Fungsi transformasi
    function translasi() {
      x += 30; // DIPERBAIKI: +30 agar benar-benar bergeser ke kanan (bukan kiri)
      // Jika kotak keluar dari batas kanvas kanan, kita balikkan ke kiri
      if (x > canvas.width + 25) {
        x = -25;
      }
      gambar();
    }
    
    function rotasi() {
      sudut += Math.PI / 10; // rotasi 18 derajat
      gambar();
    }
    
    function skala() {
      ukuran += 20; // perbesar
      // Batasi ukuran maksimal agar tidak memenuhi layar kanvas
      if (ukuran > 300) ukuran = 50; 
      gambar();
    }
    
    function reset() {
      x = 200; 
      y = 200;
      ukuran = 50; // DIPERBAIKI: disamakan dengan posisi awal (bukan 100)
      sudut = 0;
      gambar();
    }

    // Tampilkan pertama kali
    gambar();
  </script>
</body>
</html>
